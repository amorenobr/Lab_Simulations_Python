<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Physics Lab Simulations</title>
		<link
				rel="stylesheet"
				href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.css"
				/>

	</head>
		<body>
			<div id="root"></div>
			<script type="module">
				import {mount} from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";

				mount(
				{
				requirements: ["numpy", "plotly"],
				entrypoint: "Simulations.py",
				files: {
				"Simulations.py": {url: "./Simulations.py"},
				"pages/1_Linear_Motion.py": {url: "./pages/1_Linear_Motion.py"},
				"pages/2_Free_Fall.py": {url: "./pages/2_Free_Fall.py"},
				"pages/3_Projectile_Motion.py": {url: "./pages/3_Projectile_Motion.py"},
				"pages/4_Circular_Motion.py": {url: "./pages/4_Circular_Motion.py"},
				"pages/5_Oscillations.py": {url: "./pages/5_Oscillations.py"},
				"pages/6_Newtons_Laws.py": {url: "./pages/6_Newtons_Laws.py"},
				"src/lab_simulations_python/__init__.py": {url: "./src/lab_simulations_python/__init__.py"},
				"src/lab_simulations_python/linear_motion.py": {url: "./src/lab_simulations_python/linear_motion.py"},
				"src/lab_simulations_python/free_fall.py": {url: "./src/lab_simulations_python/free_fall.py"},
				"src/lab_simulations_python/projectile.py": {url: "./src/lab_simulations_python/projectile.py"},
				"src/lab_simulations_python/circular_motion.py": {url: "./src/lab_simulations_python/circular_motion.py"},
				"src/lab_simulations_python/oscillations.py": {url: "./src/lab_simulations_python/oscillations.py"},
				"src/lab_simulations_python/newtons_laws.py": {url: "./src/lab_simulations_python/newtons_laws.py"},
				"src/lab_simulations_python/i18n.py": {url: "./src/lab_simulations_python/i18n.py"},
				"assets/LogoUAN.png": {url: "./assets/LogoUAN.png"},
				".streamlit/config.toml": {url: "./.streamlit/config.toml"},
				},	
				},
				document.getElementById("root")
				);
			</script>
		</body>
</html>
