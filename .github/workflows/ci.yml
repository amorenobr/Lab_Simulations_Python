name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: prefix-dev/setup-pixi@v0.8.1
      - name: Lint
        run: pixi run ruff check .
      - name: Format check
        run: pixi run ruff format --check .
      - name: Tests
        run: pixi run pytest
